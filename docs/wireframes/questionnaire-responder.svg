  <rect x="400" y="74" width="288" height="14" rx="7" fill="#4a90d9"/>
  <text x="820" y="86" fill="#666666" font-size="12">72% complete (36/50)</text>

  <rect x="0" y="108" width="260" height="792" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <text x="20" y="138" fill="#333333" font-size="13" font-weight="bold">Questions</text>
  <rect x="8" y="158" width="244" height="38" rx="4" fill="#e3f0fc" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="20" y="182" fill="#4a90d9" font-size="12" font-weight="bold">1. Access Control Policy</text>
  <text x="235" y="182" fill="#5cb85c" font-size="14">✓</text>
  <rect x="8" y="202" width="244" height="38" rx="4" fill="#e3f0fc" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="20" y="226" fill="#4a90d9" font-size="12" font-weight="bold">2. User Authentication</text>
  <text x="235" y="226" fill="#5cb85c" font-size="14">✓</text>
  <rect x="8" y="246" width="244" height="38" rx="4" fill="#e3f0fc" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="20" y="270" fill="#4a90d9" font-size="12" font-weight="bold">3. Network Security</text>
  <text x="235" y="270" fill="#5cb85c" font-size="14">✓</text>
  <rect x="8" y="290" width="244" height="38" rx="4" fill="#eaf7ea" />
  <text x="20" y="314" fill="#5cb85c" font-size="12" >4. Data Encryption</text>
  <text x="235" y="314" fill="#5cb85c" font-size="14">✓</text>
  <rect x="8" y="334" width="244" height="38" rx="4" fill="none" />
  <text x="20" y="358" fill="#999999" font-size="12" >5. Incident Response</text>
  <rect x="8" y="378" width="244" height="38" rx="4" fill="none" />
  <text x="20" y="402" fill="#999999" font-size="12" >6. Change Management</text>
  <rect x="8" y="422" width="244" height="38" rx="4" fill="none" />
  <text x="20" y="446" fill="#999999" font-size="12" >7. Backup &amp; Recovery</text>
  <rect x="8" y="466" width="244" height="38" rx="4" fill="none" />
  <text x="20" y="490" fill="#999999" font-size="12" >8. Vendor Management</text>
