  <text x="20" y="578" fill="#999999" font-size="12" >10. Logging &amp; Monitoring</text>

  <rect x="290" y="125" width="880" height="90" rx="6" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <text x="310" y="152" fill="#4a90d9" font-size="12" font-weight="600">Question #4</text>
  <text x="310" y="178" fill="#333333" font-size="14">Describe the encryption standards used for data at rest and</text>
  <text x="310" y="198" fill="#333333" font-size="14">in transit within your infrastructure.</text>

  <text x="290" y="235" fill="#333333" font-size="14" font-weight="bold">AI-Generated Answer</text>
  <text x="460" y="235" fill="#5cb85c" font-size="12">● AI Draft</text>
  <rect x="290" y="247" width="880" height="180" rx="6" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <text x="310" y="273" fill="#333333" font-size="12">All data at rest is encrypted using AES-256 encryption. Data in transit</text>
  <text x="310" y="293" fill="#333333" font-size="12">is secured using TLS 1.3. Database-level encryption is managed through</text>
  <text x="310" y="313" fill="#333333" font-size="12">AWS KMS with customer-managed keys. Additional encryption details:</text>
  <text x="330" y="335" fill="#666666" font-size="12">• S3 buckets: SSE-KMS encryption enabled</text>
  <text x="330" y="355" fill="#666666" font-size="12">• EBS volumes: AES-256 encrypted</text>
  <text x="330" y="375" fill="#666666" font-size="12">• RDS instances: TDE enabled</text>
  <text x="330" y="395" fill="#666666" font-size="12">• API endpoints: TLS 1.3 enforced</text>
  <text x="330" y="415" fill="#666666" font-size="12">• Internal services: mTLS between microservices</text>

  <text x="290" y="445" fill="#333333" font-size="13" font-weight="bold">Linked Evidence</text>
  <rect x="290" y="455" width="224" height="28" rx="14" fill="#e3f0fc" stroke="#4a90d9" stroke-width="1"/>
  <text x="402" y="474" text-anchor="middle" fill="#4a90d9" font-size="10" font-weight="600">🔗 AES-256 Encryption Policy</text>
  <rect x="524" y="455" width="136" height="28" rx="14" fill="#e3f0fc" stroke="#4a90d9" stroke-width="1"/>
  <text x="592" y="474" text-anchor="middle" fill="#4a90d9" font-size="10" font-weight="600">🔗 AWS KMS Config</text>
  <rect x="670" y="455" width="200" height="28" rx="14" fill="#e3f0fc" stroke="#4a90d9" stroke-width="1"/>
  <text x="770" y="474" text-anchor="middle" fill="#4a90d9" font-size="10" font-weight="600">🔗 TLS Certificate Report</text>
  <rect x="880" y="455" width="248" height="28" rx="14" fill="#e3f0fc" stroke="#4a90d9" stroke-width="1"/>
  <text x="1004" y="474" text-anchor="middle" fill="#4a90d9" font-size="10" font-weight="600">🔗 Network Architecture Diagram</text>

  <rect x="290" y="500" width="120" height="38" rx="5" fill="#4a90d9" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="350" y="524" text-anchor="middle" fill="white" font-size="12" font-weight="600">Approve</text>

  <rect x="430" y="500" width="120" height="38" rx="5" fill="#f5f5f5" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="490" y="524" text-anchor="middle" fill="#4a90d9" font-size="12" font-weight="600">Edit Answer</text>

  <rect x="570" y="500" width="130" height="38" rx="5" fill="#f5f5f5" stroke="#4a90d9" stroke-width="1.5"/>
