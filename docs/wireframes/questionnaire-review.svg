  <!-- Pagination hint -->
  <text x="960" y="660" fill="#A0AEC0" font-size="12">Showing 5 of 12 documents</text>
  <text x="1100" y="660" fill="#4299E1" font-size="12">Load more ↓</text>
  
  <!-- Legend at sidebar bottom -->
  <rect x="892" y="690" width="336" height="170" rx="6" fill="#F7FAFC"/>
  <text x="912" y="716" fill="#2D3748" font-size="12" font-weight="600">Confidence Levels</text>
  <circle cx="920" cy="738" r="6" fill="#48BB78"/>
  <text x="935" y="743" fill="#4A5568" font-size="11">High (90-100%) — Auto-approved</text>
  <circle cx="920" cy="762" r="6" fill="#ECC94B"/>
  <text x="935" y="767" fill="#4A5568" font-size="11">Medium (70-89%) — Review suggested</text>
  <circle cx="920" cy="786" r="6" fill="#FC8181"/>
  <text x="935" y="791" fill="#4A5568" font-size="11">Low (&lt;70%) — Manual review required</text>
  
  <line x1="912" y1="808" x2="1208" y2="808" stroke="#E2E8F0" stroke-width="1"/>
  <text x="912" y="830" fill="#2D3748" font-size="12" font-weight="600">Shortcuts</text>
  <text x="912" y="850" fill="#A0AEC0" font-size="11">↑↓ Navigate questions  ·  Tab Next question  ·  Ctrl+S Save</text>
