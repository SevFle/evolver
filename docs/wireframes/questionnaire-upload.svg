<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="900" fill="#ffffff"/>
  <title>Questionnaire Upload</title>

  <!-- Top Navigation Bar -->
  <rect x="0" y="0" width="1200" height="56" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="20" y="16" width="120" height="24" rx="4" fill="#4a90d9"/>
  <text x="80" y="33" text-anchor="middle" fill="white" font-size="13" font-weight="bold">SecureFlow</text>
  <text x="200" y="35" fill="#333333" font-size="13" font-weight="600">Dashboard</text>
  <text x="295" y="35" fill="#666666" font-size="13">Questionnaires</text>
  <text x="410" y="35" fill="#666666" font-size="13">Evidence</text>
  <text x="495" y="35" fill="#666666" font-size="13">Integrations</text>
  <rect x="1120" y="16" width="60" height="24" rx="12" fill="#e8e8e8" stroke="#bbbbbb" stroke-width="1"/>
  <text x="1150" y="33" text-anchor="middle" fill="#666666" font-size="11">User</text>

  <text x="40" y="100" fill="#333333" font-size="22" font-weight="bold">Upload Questionnaire</text>
  <text x="40" y="122" fill="#666666" font-size="13">Upload a security questionnaire in PDF, DOCX, or XLSX format for AI processing.</text>

  <rect x="40" y="165" width="1120" height="300" rx="8" fill="#f5f5f5" stroke="#4a90d9" stroke-width="2" stroke-dasharray="8,4"/>
  <line x1="540" y1="245" x2="600" y2="245" stroke="#4a90d9" stroke-width="3"/>
  <line x1="570" y1="215" x2="570" y2="275" stroke="#4a90d9" stroke-width="3"/>
  <text x="600" y="315" text-anchor="middle" fill="#666666" font-size="15" font-weight="600">Drag and drop files here</text>
  <text x="600" y="340" text-anchor="middle" fill="#999999" font-size="12">or click to browse</text>
  <text x="600" y="375" text-anchor="middle" fill="#999999" font-size="11">Supports PDF, DOCX, XLSX (max 50 MB)</text>

  <rect x="510" y="395" width="180" height="36" rx="5" fill="#f5f5f5" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="600" y="418" text-anchor="middle" fill="#4a90d9" font-size="12" font-weight="600">Browse Files</text>

  <text x="40" y="495" fill="#333333" font-size="16" font-weight="bold">Uploaded Files</text>

  <rect x="40" y="515" width="1120" height="44" rx="6" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="60" y="525" width="30" height="24" rx="3" fill="#e8e8e8" stroke="#bbbbbb" stroke-width="1"/>
  <text x="75" y="542" text-anchor="middle" fill="#666666" font-size="9" font-weight="600">PDF</text>
  <text x="105" y="542" fill="#333333" font-size="13">SOC2_TypeII_2026.pdf</text>
  <text x="700" y="542" fill="#666666" font-size="12">2.4 MB</text>
  <circle cx="950" cy="537" r="6" fill="#5cb85c" opacity="0.6"/>
  <text x="965" y="542" fill="#666666" font-size="11">Ready</text>
  <text x="1100" y="542" fill="#d9534f" font-size="16" cursor="pointer">✕</text>

  <rect x="40" y="567" width="1120" height="44" rx="6" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="60" y="577" width="30" height="24" rx="3" fill="#e8e8e8" stroke="#bbbbbb" stroke-width="1"/>
  <text x="75" y="594" text-anchor="middle" fill="#666666" font-size="9" font-weight="600">DOCX</text>
  <text x="105" y="594" fill="#333333" font-size="13">vendor_security_questions.docx</text>
  <text x="700" y="594" fill="#666666" font-size="12">856 KB</text>
  <circle cx="950" cy="589" r="6" fill="#5cb85c" opacity="0.6"/>
  <text x="965" y="594" fill="#666666" font-size="11">Ready</text>
  <text x="1100" y="594" fill="#d9534f" font-size="16" cursor="pointer">✕</text>

  <rect x="40" y="619" width="1120" height="44" rx="6" fill="#f5f5f5" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="60" y="629" width="30" height="24" rx="3" fill="#e8e8e8" stroke="#bbbbbb" stroke-width="1"/>
  <text x="75" y="646" text-anchor="middle" fill="#666666" font-size="9" font-weight="600">XLSX</text>
  <text x="105" y="646" fill="#333333" font-size="13">PCI-DSS_SAQ_v4.xlsx</text>
  <text x="700" y="646" fill="#666666" font-size="12">1.1 MB</text>
  <circle cx="950" cy="641" r="6" fill="#5cb85c" opacity="0.6"/>
  <text x="965" y="646" fill="#666666" font-size="11">Ready</text>
  <text x="1100" y="646" fill="#d9534f" font-size="16" cursor="pointer">✕</text>

  <rect x="40" y="701" width="220" height="48" rx="5" fill="#4a90d9" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="150" y="730" text-anchor="middle" fill="white" font-size="12" font-weight="600">Process Questionnaires</text>
</svg>